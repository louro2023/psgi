{% if control_area %}
<section class="module-hero">
    <div>
        <p class="eyebrow">Gestão de controles</p>
        <h2>Controles, riscos, ações e evidências no mesmo fluxo</h2>
    </div>
    <a class="button primary" href="{{ url_for('control_center') }}">Visão geral</a>
</section>

<nav class="module-tabs">
    {% for tab in control_tabs %}
        {% if has_permission(tab.module, tab.action) %}
            <a href="{{ url_for(tab.endpoint, **tab.params) }}" class="module-tab {% if control_area == tab.key %}active{% endif %}">
                <strong>{{ tab.label }}</strong>
                <span>{{ tab.description }}</span>
            </a>
        {% endif %}
    {% endfor %}
</nav>
{% endif %}
